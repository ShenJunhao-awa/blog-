name: Build

on:
  push:
    branches:
      - main
      - master
      - trunk
  pull_request:
    branches:
      - main
      - master
      - trunk
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run check

      # Save build metadata for deploy workflow
      - name: Save build metadata
        run: |
          DEPLOY_SCRIPT_HASH=$(cat ./cli/src/tasks/deploy-cf.ts ./cli/src/lib/db-migration.ts | sha256sum | awk '{print $1}')
          mkdir -p ./build-meta
          echo "${{ github.event_name }}" > ./build-meta/event_name
          echo "${{ github.ref }}" > ./build-meta/ref
          echo "${{ github.repository }}" > ./build-meta/repository
          echo "${{ github.event.number || '0' }}" > ./build-meta/pr_number
          echo "${{ github.sha }}" > ./build-meta/sha
          echo "${{ github.event.pull_request.head.sha || github.sha }}" > ./build-meta/head_sha
          echo "$DEPLOY_SCRIPT_HASH" > ./build-meta/deploy_script_hash

      # Build client (no env vars needed, config is fetched from server at runtime)
      # Note: vite.config.ts builds directly to ../dist/client
      - name: Build client
        run: |
          cd client
          bun run build
          cd ..

      # Generate wrangler.toml for build (required by wrangler deploy --dry-run)
      - name: Setup Wrangler
        uses: ./.github/actions/setup-wrangler
        with:
          mode: 'dry-run'

      # Build server (wrangler dry-run to output dist)
      # Note: Must run from root dir where wrangler.toml exists
      - name: Build server
        run: |
          mkdir -p ./dist/server
          bunx wrangler deploy --dry-run --outdir=dist/server

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: |
            ./dist
            ./build-meta
            ./server/sql
          retention-days: 1

      - name: Deploy to Cloudflare
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'pull_request' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEFAULT_WORKER_NAME: ${{ vars.WORKER_NAME || 'rin-server' }}
          DEFAULT_DB_NAME: ${{ vars.DB_NAME || 'rin' }}
          NAME: ${{ vars.NAME || 'Rin' }}
          DESCRIPTION: ${{ vars.DESCRIPTION || 'A lightweight personal blogging system' }}
          AVATAR: ${{ vars.AVATAR || '' }}
          PAGE_SIZE: ${{ vars.PAGE_SIZE || '5' }}
          RSS_ENABLE: ${{ vars.RSS_ENABLE || 'false' }}
          S3_CACHE_FOLDER: ${{ vars.S3_CACHE_FOLDER || 'cache/' }}
          S3_FOLDER: ${{ vars.S3_FOLDER || 'images/' }}
          S3_REGION: ${{ vars.S3_REGION || 'auto' }}
          S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE || 'false' }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME || '' }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT || '' }}
          S3_ACCESS_HOST: ${{ vars.S3_ACCESS_HOST || '' }}
          S3_BUCKET: ${{ vars.S3_BUCKET || '' }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID || '' }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY || '' }}
          RIN_GITHUB_CLIENT_ID: ${{ secrets.RIN_GITHUB_CLIENT_ID || '' }}
          RIN_GITHUB_CLIENT_SECRET: ${{ secrets.RIN_GITHUB_CLIENT_SECRET || '' }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || '' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || '' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || '' }}
          WEBHOOK_URL: ${{ vars.WEBHOOK_URL || '' }}
          RSS_TITLE: ${{ vars.RSS_TITLE || '' }}
          RSS_DESCRIPTION: ${{ vars.RSS_DESCRIPTION || '' }}
          CACHE_STORAGE_MODE: ${{ vars.CACHE_STORAGE_MODE || 's3' }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing required Cloudflare secrets: CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            export WORKER_NAME="${DEFAULT_WORKER_NAME}-pr-${GITHUB_HEAD_REF:-${GITHUB_REF##*/}}"
            export DB_NAME="${DEFAULT_DB_NAME}-preview"
            bun run deploy --preview | tee deploy_output.log
          elif [ "${GITHUB_REF}" = "refs/heads/main" ] || [ "${GITHUB_REF}" = "refs/heads/master" ] || [ "${GITHUB_REF}" = "refs/heads/trunk" ]; then
            export WORKER_NAME="${DEFAULT_WORKER_NAME}"
            export DB_NAME="${DEFAULT_DB_NAME}"
            bun run deploy | tee deploy_output.log
          else
            BRANCH_NAME="${GITHUB_REF##*/}"
            SAFE_BRANCH=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/-\{2,\}/-/g' | sed 's/^-\|-$//g')
            export WORKER_NAME="${DEFAULT_WORKER_NAME}-preview-${SAFE_BRANCH}"
            export DB_NAME="${DEFAULT_DB_NAME}-preview"
            bun run deploy --preview | tee deploy_output.log
          fi

          echo "---- Deployment summary ----"
          grep -oE 'https://[^ ]+' deploy_output.log | head -n 5 || true
